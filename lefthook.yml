pre-commit:
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: bunx biome check --write --staged
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    deps:
      glob: "{package.json,bun.lock}"
      run: bun run lint:deps
    typecheck:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: bun run typecheck:graph
